[tool.ruff]
# Под какую версию Python проверять синтаксис и правила
target-version = "py314"
# Максимальная длина строки
line-length = 88

[tool.ruff.lint]
# Какие группы правил включены: E - pycodestyle, F - pyflakes, I - сортировка импортов
select = ["E", "F", "I"]

[tool.ruff.format]
# Использовать двойные кавычки
quote-style = "double"
# Использовать пробелы вместо табов
indent-style = "space"
# Оставлять "магические" висячие запятые для удобного переноса строк
skip-magic-trailing-comma = false
# Автоматически выбрать стиль перевода строк под среду/файл
line-ending = "auto"

[tool.mypy]
# Какие каталоги проверять по умолчанию
files = ["app"]
# Под какую версию Python проверять типы
python_version = "3.14"
# Проверять даже тела функций без полной типизации
check_untyped_defs = true
# Показывать коды ошибок рядом с сообщениями
show_error_codes = true
# Предупреждать о лишних type: ignore
warn_unused_ignores = true
# Не падать на внешних библиотеках без type stubs
ignore_missing_imports = true

[tool.pytest.ini_options]
pythonpath = ["."]